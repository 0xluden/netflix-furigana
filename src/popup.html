<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Japanese</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a, #111);
      border-bottom: 1px solid rgba(255, 224, 130, 0.2);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #e50914;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 10px;
      color: #ffe082;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .toggle-row:last-child {
      border-bottom: none;
    }

    .toggle-label {
      font-size: 13px;
      color: #ddd;
    }

    .toggle-hint {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: 0.25s;
    }

    input:checked + .slider {
      background: rgba(255, 224, 130, 0.25);
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #ffe082;
    }

    .shortcut-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .shortcut-name {
      font-size: 12px;
      color: #bbb;
    }

    kbd {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: #ffe082;
      font-family: monospace;
    }

    .status {
      font-size: 11px;
      color: #666;
      text-align: center;
      padding: 6px 0 2px;
    }

    .status span {
      color: #4caf50;
    }

    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎌</div>
    <div>
      <div class="title">Netflix Japanese</div>
      <div class="subtitle">日本語学習アシスタント</div>
    </div>
  </div>

  <div class="body">
    <div>
      <div class="section-label">設定 / Settings</div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">ふりがな表示</div>
          <div class="toggle-hint">Show furigana above kanji</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-furigana" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">ホバー辞書</div>
          <div class="toggle-hint">Show tooltip on hover</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-tooltip" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div>
      <div class="section-label">ショートカット</div>
      <div class="shortcut-box">
        <div class="shortcut-row">
          <span class="shortcut-name">ふりがな ON/OFF</span>
          <kbd>F</kbd>
        </div>
        <div class="shortcut-row">
          <span class="shortcut-name">Hide tooltip</span>
          <kbd>Esc</kbd>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="status" id="status">検出中… <span>●</span></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
